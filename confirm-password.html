<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/feather-icons"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <h1>Confirm Password</h1>
    <p class="subtitle">Please confirm your password before continuing.</p>
    <form id="confirm-form">
      <div class="form-group password-wrap">
        <input type="password" id="password" class="form-control" placeholder="Password" required>
        <button type="button" class="password-toggle" id="togglePass"><i data-feather="eye"></i></button>
      </div>
      <button type="submit" class="btn btn-dark btn-block">Confirm</button>
    </form>
  </div>
</div>

<script type="module">
import { auth } from './js/firebase-config.js';
import { EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { showToast, showLoader, hideLoader } from './js/utils.js';
feather.replace();

document.getElementById('togglePass').addEventListener('click', () => {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
});

const params = new URLSearchParams(window.location.search);
const redirect = params.get('redirect') || 'dashboard.html';

document.getElementById('confirm-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  showLoader();
  try {
    const user = auth.currentUser;
    if (!user) { window.location.href = 'login.html'; return; }
    const cred = EmailAuthProvider.credential(user.email, document.getElementById('password').value);
    await reauthenticateWithCredential(user, cred);
    sessionStorage.setItem('passwordConfirmed', 'true');
    showToast('Password confirmed');
    setTimeout(() => window.location.href = redirect, 500);
  } catch (err) { showToast('Incorrect password', 'error'); }
  finally { hideLoader(); }
});
</script>
</body>
</html>
